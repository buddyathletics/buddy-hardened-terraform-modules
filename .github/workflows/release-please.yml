name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # When release-please cuts a release (i.e. its release PR was just merged),
      # the action also creates a git tag + GitHub release automatically. The
      # `release_created` output lets downstream jobs trigger off the cut.
      - name: Report release outcome
        if: steps.release.outputs.release_created == 'true'
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          echo "Released $RELEASE_TAG"
